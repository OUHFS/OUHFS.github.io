
<!--  Dynamic Eyes Animation -->


<!DOCTYPE html>
<html lang="en">


  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- The above 3 meta tags *must* come first in the head; any other head content must come *after* these tags -->
    <title>animation</title>

    <!-- Bootstrap -->
    <link href="css/bootstrap.min.css" rel="stylesheet">

    <!-- HTML5 shim and Respond.js for IE8 support of HTML5 elements and media queries -->
    <!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
    <!--[if lt IE 9]>
      <script src="https://oss.maxcdn.com/html5shiv/3.7.2/html5shiv.min.js"></script>

<!-- Copy from here to last </script> into weebly html embedded code for moving eyes animation -->
<!-- Reference: http://jsfiddle.net/78ktpaqv/11/ -->
    
    <!-- CSS code in style -->
    <style>
      div.eyes {
        width: 160px;
        height: 0;
        margin-left: 0px;
        margin-top: 0px;
        position: relative;
      }

      div.left_eye,
      div.right_eye {
        width: 60px;
        height: 60px;
        top: 0;
        position: absolute;
        background-repeat: no-repeat;
        background-position: center center;                  
      }

      div.left_eye {
        left: 0;
      }

      div.right_eye {
        right: 0;
      }

      div.eyes div.pupil {
        left: 17px;
        top: 17px;
        width: 25px;
        height: 25px;
        position: relative;
        background-image: url("http://i.imgur.com/GKex9PY.png");
        background-repeat: no-repeat;
        background-position: center center;         
      }

      #ellipse div.left_eye,
      #ellipse div.right_eye {
        background-image: url("http://i.imgur.com/HLTwbEI.png");
      }
    </style>


    <!-- HTML code -->
    <div id="ellipse" class="eyes">
      <div class="left_eye">
          <div class="pupil"></div>
      </div>
      <div class="right_eye">
          <div class="pupil"></div>
      </div>
    </div>


    <!-- Javascript code in script -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>

    <script type="text/javascript" href="https://raw.githubusercontent.com/jfmdev/jqEye/master/Source/jqeye.js">
      jQuery(document).ready(function() {
        jQuery("#ellipse div.pupil").jqEye({shape: "ellipse", width:34, height:14});
      });

  </body>

</html>
